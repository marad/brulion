<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brulion — quick capture</title>
  </head>
  <body>
    <header>
      <button
        id="toggle-sidebar"
        type="button"
        aria-label="Toggle note list"
        aria-pressed="false"
        title="Toggle note list (Ctrl+\)"
        hidden
      >
        ☰
      </button>
      <button id="open-folder" type="button">Open folder</button>
      <button id="resume-access" type="button" hidden>Resume folder access</button>
      <button
        id="toggle-vim"
        type="button"
        aria-label="Toggle Vim mode"
        aria-pressed="false"
        title="Toggle Vim mode"
        hidden
      >
        Vim
      </button>
    </header>
    <p id="status" hidden></p>
    <div id="conflict-backdrop" hidden>
      <div id="conflict" role="alertdialog" aria-modal="true" aria-label="Note changed on disk">
        <p>This note changed on disk. Keep your version or take the one on disk?</p>
        <div class="conflict-actions">
          <button id="conflict-keep" type="button">Keep my version</button>
          <button id="conflict-disk" type="button">Use the version on disk</button>
        </div>
      </div>
    </div>
    <main class="workspace">
      <aside id="sidebar" hidden>
        <form id="new-note">
          <input
            id="new-note-input"
            type="text"
            placeholder="New note…"
            aria-label="New note name"
            autocomplete="off"
          />
        </form>
        <div id="note-list" aria-label="Notes"></div>
      </aside>
      <div id="editor"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
