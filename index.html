<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brulion — quick capture</title>
  </head>
  <body>
    <header>
      <button id="open-folder" type="button">Open folder</button>
      <button id="resume-access" type="button" hidden>Resume folder access</button>
    </header>
    <p id="status" hidden></p>
    <main class="workspace">
      <aside id="sidebar" hidden>
        <form id="new-note">
          <input
            id="new-note-input"
            type="text"
            placeholder="New note…"
            aria-label="New note name"
            autocomplete="off"
          />
        </form>
        <div id="note-list" aria-label="Notes"></div>
      </aside>
      <div id="editor"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
