  <g>
    <rect x="176" y="146" width="160" height="220" rx="18" fill="#fbfbfa"/>
    <g stroke="#9a3b2f" stroke-width="13" stroke-linecap="round" opacity="0.85">
      <line x1="204" y1="196" x2="308" y2="196"/>
      <line x1="204" y1="238" x2="308" y2="238"/>
      <line x1="204" y1="280" x2="308" y2="280"/>
      <line x1="204" y1="322" x2="272" y2="322"/>
    </g>
  </g>
</svg>
